<div class="loading-animation">
<section class="resume">
    <div class="resume-info">
        <p class="second-label">
            <span class="label-emoji">
                &#x1F64B;
            </span>
            &nbsp; Education & Work Experience
                <a href="{{ site.baseurl }}/img/Yeji_CV 2026.pdf"
                   class="resume-download transition"
                   target="_blank">
                   📄 View Resume
                </a>
        </p>
    </div>
    <ul>

        {% include project-list.html %}

    </ul>
    
    <a href="{{ site.baseurl | append: '/project' }}" class="transition"> 
        <div class="view-all-projects transition">
            View detailed projects
            <svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><defs><style>.cls-1{fill:none;}</style></defs><path d="M7.2,17.9l6.1-6.1L7.2,5.6,9,3.8l8,8-8,8Z"/><path class="cls-1" d="M.1-.2h24v24H.1Z"/></svg>
        </div>
    </a>

</section>


<section class="skill">
    <div class="resume-info">
        <p class="second-label">
            <span class="label-emoji">
                &#x1F4AA;
            </span>
            &nbsp; Technical Skills
        </p>
    </div>
    {% for group in site.data.skill-roles %}
        <div class="skill-category">
            <p class="skill-category-name">{{ group.category }}</p>
            <ul class="skill-list">
                {% for item in group.items %}
                    <li class="skill_name{% if group.category == 'Certifications' %} skill_cert{% endif %}">{{ item }}</li>
                {% endfor %}
            </ul>
        </div>
    {% endfor %}
</section>
</div>
